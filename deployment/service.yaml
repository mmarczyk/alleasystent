# Cloud Run service manifest (alternative to gcloud deploy flags)
# Deploy with: gcloud run services replace deployment/service.yaml --region=europe-central2

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: alleasystent
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: alleasystent-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: europe-central2-docker.pkg.dev/PROJECT_ID/alleasystent/app:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
          env:
            - name: APP_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: GCP_REGION
              value: europe-central2
            - name: RAG_BACKEND
              value: chromadb
            - name: EMBEDDING_BACKEND
              value: local
          envFrom: []
          volumeMounts:
            - mountPath: /app/data
              name: data-volume
      volumes:
        - name: data-volume
          emptyDir: {}
