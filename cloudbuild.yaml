# GCP Cloud Build — builds and deploys to Cloud Run
# Triggered automatically by Cloud Run's GitHub integration on each push to main.
#
# One-time setup in Cloud Run console (Variables & Secrets tab) after first deploy:
#   FRONTEND_URL        = https://mmarczyk.github.io/alleasystent
#   ALLEGRO_REDIRECT_URI = https://YOUR-SERVICE.run.app/allegro/callback
#
# Required GCP Secret Manager secrets (create once):
#   google-api-key        — Gemini API key
#   allegro-client-id     — Allegro OAuth client ID
#   allegro-client-secret — Allegro OAuth client secret
#   redis-url             — Redis connection string
#   jwt-secret            — Random string for JWT signing
#   fb-page-token         — Facebook Page Access Token (or empty)
#   fb-app-secret         — Facebook App Secret (or empty)

steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
      - "-t"
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app"

  # Deploy to Cloud Run
  # --update-* flags: only touch the listed vars/secrets, preserve everything else
  # (including FRONTEND_URL and ALLEGRO_REDIRECT_URI set via Cloud Run console)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - alleasystent
      - "--image=europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
      - "--region=europe-central2"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=2Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--service-account=alleasystent-sa@$PROJECT_ID.iam.gserviceaccount.com"
      - "--update-secrets=GOOGLE_API_KEY=google-api-key:latest,FACEBOOK_PAGE_ACCESS_TOKEN=fb-page-token:latest,FACEBOOK_APP_SECRET=fb-app-secret:latest,ALLEGRO_CLIENT_ID=allegro-client-id:latest,ALLEGRO_CLIENT_SECRET=allegro-client-secret:latest,REDIS_URL=redis-url:latest,JWT_SECRET=jwt-secret:latest"
      - "--update-env-vars=APP_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,RAG_BACKEND=chromadb,PORT=8080"

images:
  - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
  - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:latest"

options:
  logging: CLOUD_LOGGING_ONLY
