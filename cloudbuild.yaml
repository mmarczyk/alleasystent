# GCP Cloud Build — builds and deploys to Cloud Run
# Trigger: push to main branch
#
# Required GCP Secret Manager secrets (create once with `gcloud secrets create`):
#   google-api-key         — Gemini API key (GOOGLE_API_KEY)
#   fb-page-token          — Facebook Page Access Token
#   fb-app-secret          — Facebook App Secret
#   allegro-client-id      — Allegro OAuth client ID
#   allegro-client-secret  — Allegro OAuth client secret
#   redis-url              — Redis connection string (e.g. from Railway / Upstash)
#   jwt-secret             — Random secret for JWT session tokens
#
# Configure these Cloud Build substitution variables (or set them directly
# in the --set-env-vars below after the first deployment):
#   _FRONTEND_URL          — GitHub Pages URL, e.g. https://user.github.io/alleasystent
#                            (leave empty for all-in-one mode where Cloud Run serves web/)
#   _SERVICE_URL           — Cloud Run service URL (needed for ALLEGRO_REDIRECT_URI)
#                            e.g. https://alleasystent-abc123-ew.a.run.app

substitutions:
  _FRONTEND_URL: ''
  _SERVICE_URL: ''

steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
      - "-t"
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - alleasystent
      - "--image=europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
      - "--region=europe-central2"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=2Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-secrets=GOOGLE_API_KEY=google-api-key:latest,FACEBOOK_PAGE_ACCESS_TOKEN=fb-page-token:latest,FACEBOOK_APP_SECRET=fb-app-secret:latest,ALLEGRO_CLIENT_ID=allegro-client-id:latest,ALLEGRO_CLIENT_SECRET=allegro-client-secret:latest,REDIS_URL=redis-url:latest,JWT_SECRET=jwt-secret:latest"
      - "--set-env-vars=APP_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,RAG_BACKEND=chromadb,PORT=8080,FRONTEND_URL=${_FRONTEND_URL},ALLEGRO_REDIRECT_URI=${_SERVICE_URL}/allegro/callback"
      - "--service-account=alleasystent-sa@$PROJECT_ID.iam.gserviceaccount.com"

images:
  - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:$COMMIT_SHA"
  - "europe-central2-docker.pkg.dev/$PROJECT_ID/alleasystent/app:latest"

options:
  logging: CLOUD_LOGGING_ONLY
